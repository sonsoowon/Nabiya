{% extends base.html %}
{% block css %}
{% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'new_post_2.css %}"/> 
{% endblock css %}

{% block content %}
<div class="emotion">
    {{post.emotion}} 
</div>
<div class="uploaded">
    {{post.uploaded}}
</div>
<div class="photo">
    {{post.photo}}    
</div>
<form method="POST">
    {% csrf_token %}
    <textarea name="content" placeholder="내용을 작성하세요."></textarea>
    <button type="submit">
        완료
    </button>
</form>
{% endblock content %}
