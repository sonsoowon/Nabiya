{% extends 'base.html' %}
{% block css %}
{% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'list.css' %}"/> 
{% endblock css %}

{% block content %}
<ul class="list_container">
    {% for post in posts %}
        <li class="list_item"><img src="{{post.photo.url}}">{{post.writer}}{{post.content}}</li>
    {% endfor %}
</ul>
{% endblock content %}
